<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyNews">
<meta name="theme-color" content="#0a0a0f">
<title>MyNews</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--sf:#13131a;--sf2:#1c1c27;--bd:#2a2a3a;--ac:#4f8ef7;--ac2:#7c5cfc;--tx:#e8e8f0;--tx2:#8888aa;--tx3:#555570;--r:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}
#hd{position:fixed;top:0;left:0;right:0;z-index:100;padding-top:var(--st);background:rgba(10,10,15,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
#hi{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
#logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#ha{display:flex;gap:8px;align-items:center}
.ib{width:38px;height:38px;border:none;background:var(--sf2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:.15s;flex-shrink:0}
.ib:active{background:var(--bd)}
.ib.spin svg{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}
#fb{overflow-x:auto;padding:8px 16px 10px;display:flex;gap:8px;scrollbar-width:none}
#fb::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s;white-space:nowrap}
.chip.active{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
#main{padding:calc(var(--st) + 104px) 12px calc(var(--sb) + 80px)}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--sf);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);cursor:pointer;transition:transform .15s;animation:fu .35s ease both}
.card:active{transform:scale(.97)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ct{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--sf2);display:block}
.cp{width:100%;aspect-ratio:16/9;background:var(--sf2);display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:28px}
.cb{padding:9px 10px 11px}
.cs{font-size:10px;color:var(--ac);font-weight:700;letter-spacing:.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctitle{font-size:12px;line-height:1.5;font-weight:500;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cd{margin-top:6px;font-size:10px;color:var(--tx3)}
#sv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:14px;color:var(--tx2);text-align:center;padding:20px}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .75s linear infinite}
#sv p{font-size:14px;line-height:1.7}
.retry-btn{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
#updated{text-align:center;font-size:10px;color:var(--tx3);padding:6px 0 0}
#so{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#so.open{display:flex;align-items:flex-end}
#sp{width:100%;max-height:85dvh;background:var(--sf);border-radius:20px 20px 0 0;border-top:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--sb);animation:su .3s cubic-bezier(.32,.72,0,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
#sh{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);flex-shrink:0}
#sh h2{font-size:17px;font-weight:700}
#ss{overflow-y:auto;flex:1;padding:12px 0}
.sr{display:flex;align-items:center;padding:12px 20px;gap:12px;border-bottom:1px solid var(--bd)}
.sr:last-child{border-bottom:none}
.si{flex:1;min-width:0}
.sn{font-size:14px;font-weight:500}
.su2{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.tg{position:relative;width:44px;height:26px;flex-shrink:0}
.tg input{opacity:0;width:0;height:0;position:absolute}
.tt{position:absolute;inset:0;background:var(--bd);border-radius:13px;transition:.2s;cursor:pointer}
.tg input:checked+.tt{background:var(--ac)}
.tt::after{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tg input:checked+.tt::after{transform:translateX(18px)}
.db{background:none;border:none;color:#e05555;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
#af{padding:16px 20px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
#af input{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--tx);outline:none;width:100%}
#af input:focus{border-color:var(--ac)}
#af input::placeholder{color:var(--tx3)}
#af button{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
#ao{display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column}
#ao.open{display:flex}
#ah{display:flex;align-items:center;gap:12px;padding:12px 16px;padding-top:calc(var(--st) + 12px);background:rgba(10,10,15,.95);border-bottom:1px solid var(--bd);flex-shrink:0}
#asl{flex:1;font-size:13px;font-weight:700;color:var(--ac);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xb{background:var(--sf2);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:18px;flex-shrink:0}
#rh{text-align:center;font-size:11px;color:var(--tx3);padding:8px 0 0}
#guide{position:fixed;bottom:0;left:0;right:0;z-index:400;padding:14px 16px calc(var(--sb)+14px);background:#1a2540;border-top:2px solid var(--ac);display:none;align-items:center;gap:10px;animation:su .4s ease}
#guide p{font-size:12px;line-height:1.6;color:#aac4f0;flex:1}
#guide strong{color:#fff}
#gc{background:none;border:none;color:var(--tx3);font-size:22px;cursor:pointer}
</style>
</head>
<body>
<div id="hd">
  <div id="hi">
    <div id="logo">MyNews</div>
    <div id="ha">
      <button class="ib" id="rb" onclick="loadData()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="ib" onclick="openSettings()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="fb"></div>
</div>

<div id="main">
  <div id="sv"><div class="spinner"></div><p>ニュースを読み込み中...</p></div>
  <div id="grid" style="display:none"></div>
  <p id="updated" style="display:none"></p>
  <p id="rh" style="display:none">↓ 引っ張って更新</p>
</div>

<div id="so" onclick="maybeClose(event)">
  <div id="sp">
    <div id="sh"><h2>メディア設定</h2>
      <button class="ib" onclick="closeSettings()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="ss"><div id="sl"></div></div>
    <div id="af">
      <input id="an" placeholder="メディア名（例: 読売新聞）" type="text">
      <input id="au" placeholder="RSS URL（https://...）" type="url" inputmode="url">
      <button onclick="addSource()">＋ メディアを追加</button>
    </div>
  </div>
</div>

<div id="ao">
  <div id="ah">
    <button class="xb" onclick="closeArticle()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span id="asl"></span>
    <button class="ib" onclick="openSafari()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </button>
  </div>
  <iframe id="ai" sandbox="allow-scripts allow-popups allow-forms allow-top-navigation-by-user-activation" style="flex:1;border:none;background:#fff;width:100%;height:100%"></iframe>
</div>

<div id="guide">
  <p>📱 <strong>ホーム画面に追加</strong>するとアプリとして使えます<br>Safari下部 <strong>共有ボタン（□↑）→「ホーム画面に追加」</strong></p>
  <button id="gc" onclick="dismissGuide()">×</button>
</div>

<script>
// 設定（ON/OFFのみ管理。URLはサーバー側で固定）
var DS_IDS = ['s1','s2','s3','s4','s5','s6','s7'];
var DS_NAMES = {
  s1:'NHK ニュース', s2:'朝日新聞', s3:'日本経済新聞',
  s4:'テレ朝NEWS', s5:'TBS NEWS DIG', s6:'FNNプライムオンライン', s7:'毎日新聞'
};

var allArticles = [], articles = [], fid = null, curUrl = '', loading = false;
var enabledSet = loadEnabled();

function loadEnabled() {
  try {
    var s = localStorage.getItem('mn_enabled');
    if (s) return new Set(JSON.parse(s));
  } catch(e) {}
  return new Set(DS_IDS); // デフォルト全ON
}
function saveEnabled() {
  try { localStorage.setItem('mn_enabled', JSON.stringify(Array.from(enabledSet))); } catch(e) {}
}

async function loadData() {
  if (loading) return;
  loading = true;
  document.getElementById('rb').classList.add('spin');
  showLoading();
  try {
    // 同一オリジンのdata.jsonを読むだけ→CORSなし
    var r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error('data.json が見つかりません (HTTP ' + r.status + ')。\nGitHub Actionsを一度手動で実行してください。');
    var data = await r.json();
    allArticles = (data.items || []).map(function(i) {
      return Object.assign({}, i, { pubDate: i.pubDate ? new Date(i.pubDate) : null });
    });
    renderChips();
    applyFilter();
    // 更新日時を表示
    if (data.updated) {
      var d = new Date(data.updated);
      document.getElementById('updated').textContent = '最終更新: ' + d.toLocaleString('ja-JP');
      document.getElementById('updated').style.display = 'block';
    }
  } catch(e) {
    showError(e.message);
  } finally {
    loading = false;
    document.getElementById('rb').classList.remove('spin');
  }
}

function showLoading() {
  document.getElementById('sv').style.display='flex';
  document.getElementById('sv').innerHTML='<div class="spinner"></div><p>読み込み中...</p>';
  document.getElementById('grid').style.display='none';
  document.getElementById('rh').style.display='none';
  document.getElementById('updated').style.display='none';
}
function showError(msg) {
  document.getElementById('sv').style.display='flex';
  document.getElementById('sv').innerHTML='<p style="white-space:pre-line">'+e(msg)+'</p><button class="retry-btn" onclick="loadData()">再試行</button>';
  document.getElementById('grid').style.display='none';
}

function applyFilter() {
  articles = allArticles.filter(function(a) {
    return enabledSet.has(a.sid) && (fid === null || a.sid === fid);
  });
  renderGrid();
}

function renderChips() {
  var h='<button class="chip'+(fid===null?' active':'')+'" onclick="setF(null)">すべて</button>';
  DS_IDS.forEach(function(id) {
    if (!enabledSet.has(id)) return;
    h+='<button class="chip'+(fid===id?' active':'')+'" onclick="setF(\''+id+'\')">'+e(DS_NAMES[id])+'</button>';
  });
  document.getElementById('fb').innerHTML=h;
}
function setF(id){ fid=id; renderChips(); applyFilter(); }

function renderGrid() {
  var V=document.getElementById('sv'),G=document.getElementById('grid'),R=document.getElementById('rh');
  if (!articles.length) {
    V.style.display='flex';
    V.innerHTML='<p>記事がありません</p><button class="retry-btn" onclick="loadData()">再読み込み</button>';
    G.style.display='none'; R.style.display='none'; return;
  }
  V.style.display='none'; G.style.display='grid'; R.style.display='block';
  G.innerHTML=articles.map(function(a,i){
    var delay=Math.min(i*20,400);
    var th=a.image
      ?'<img class="ct" src="'+e(a.image)+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="cp" style="display:none">📰</div>'
      :'<div class="cp">📰</div>';
    var dt=a.pubDate?rel(a.pubDate):'';
    return '<div class="card" style="animation-delay:'+delay+'ms" onclick="openA('+i+')">'
      +th+'<div class="cb"><div class="cs">'+e(a.source)+'</div>'
      +'<div class="ctitle">'+e(a.title)+'</div>'
      +(dt?'<div class="cd">'+dt+'</div>':'')
      +'</div></div>';
  }).join('');
}

function openA(i) {
  var a=articles[i]; if(!a) return;
  curUrl=a.link;
  document.getElementById('asl').textContent=a.source;
  document.getElementById('ai').src=a.link;
  document.getElementById('ao').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeArticle(){
  document.getElementById('ao').classList.remove('open');
  document.getElementById('ai').src='about:blank';
  document.body.style.overflow='';
}
function openSafari(){ if(curUrl) window.open(curUrl,'_blank'); }

function openSettings(){ renderSL(); document.getElementById('so').classList.add('open'); document.body.style.overflow='hidden'; }
function closeSettings(){ document.getElementById('so').classList.remove('open'); document.body.style.overflow=''; saveEnabled(); renderChips(); applyFilter(); }
function maybeClose(ev){ if(ev.target===document.getElementById('so')) closeSettings(); }

function renderSL(){
  document.getElementById('sl').innerHTML=DS_IDS.map(function(id){
    return '<div class="sr"><div class="si"><div class="sn">'+e(DS_NAMES[id])+'</div></div>'
      +'<label class="tg"><input type="checkbox"'+(enabledSet.has(id)?' checked':'')+' onchange="togSrc(\''+id+'\',this.checked)"><div class="tt"></div></label>'
      +'</div>';
  }).join('');
}
function togSrc(id,v){
  if(v) enabledSet.add(id); else enabledSet.delete(id);
}
// カスタムソース追加（将来拡張用・現在はUIのみ）
function addSource(){
  alert('カスタムソースの追加はGitHub Actionsのfetch-rss.ymlを編集して追加してください。');
}

function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function rel(d){
  var s=(Date.now()-d.getTime())/1000;
  if(s<60) return 'たった今';
  if(s<3600) return Math.floor(s/60)+'分前';
  if(s<86400) return Math.floor(s/3600)+'時間前';
  return Math.floor(s/86400)+'日前';
}
function dismissGuide(){ localStorage.setItem('mn_g','1'); document.getElementById('guide').style.display='none'; }
function showGuide(){
  var isSafari=/Safari/.test(navigator.userAgent)&&!/Chrome/.test(navigator.userAgent);
  if(isSafari&&!window.navigator.standalone&&!localStorage.getItem('mn_g'))
    document.getElementById('guide').style.display='flex';
}

var ty=0;
document.addEventListener('touchstart',function(ev){ty=ev.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',function(ev){
  if(ev.changedTouches[0].clientY-ty>80&&window.scrollY===0&&!loading) loadData();
},{passive:true});

loadData();
showGuide();
</script>
</body>
</html>
